<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记单词小助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
/* ========== Variables ========== */
:root {
    --primary: #7C4DFF;
    --primary-light: #B388FF;
    --primary-dark: #651FFF;
    --secondary: #FF6B9D;
    --secondary-light: #FF9BC0;
    --success: #66BB6A;
    --success-light: #A5D6A7;
    --error: #EF5350;
    --error-light: #EF9A9A;
    --warning: #FFA726;
    --bg-start: #E8EAF6;
    --bg-mid: #F3E5F5;
    --bg-end: #FCE4EC;
    --card-bg: #FFFFFF;
    --card-shadow: 0 4px 20px rgba(124, 77, 255, 0.1);
    --card-shadow-hover: 0 6px 28px rgba(124, 77, 255, 0.18);
    --text-primary: #333333;
    --text-secondary: #666666;
    --text-light: #999999;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: var(--font-family);
    background: linear-gradient(150deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ========== App Layout ========== */
#app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
}

.page {
    display: none;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: 32px;
    animation: fadeIn 0.3s ease;
}

.page.active { display: block; }

#page-word.active {
    display: flex !important;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    min-height: 0;
    padding-bottom: 0;
    overflow: hidden;
}

#page-word > .page-header {
    position: relative;
    flex-shrink: 0;
}

#page-word .word-scroll {
    flex: 1 1 0%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
}

/* ========== Learn Page Flex Layout ========== */
#page-learn.active {
    display: flex !important;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    min-height: 0;
    padding-bottom: 0;
    overflow: hidden;
}

#page-learn > .page-header {
    position: relative;
    flex-shrink: 0;
}

#page-learn .learn-container {
    flex: 1 1 0%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
}

#page-learn .learn-bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    gap: 12px;
    background: var(--card-bg);
    border-top: 1px solid #F0E8FF;
    flex-shrink: 0;
}

/* ========== Page Header ========== */
.page-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(124, 77, 255, 0.25);
}

.page-header h1 {
    color: white;
    font-size: 20px;
    font-weight: 800;
    flex: 1;
    text-align: center;
}

.header-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
}

.header-btn:active { background: rgba(255,255,255,0.35); }
.header-btn.invisible { visibility: hidden; }

/* ========== Page Content ========== */
.page-content { padding: 20px 16px; }

/* ========== Home Page ========== */
.home-welcome {
    text-align: center;
    padding: 28px 20px 8px;
}

.home-welcome .mascot { font-size: 64px; line-height: 1; }

.home-welcome h2 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 8px;
}

.home-welcome p { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }

.home-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 16px;
}

.home-card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 22px 14px;
    text-align: center;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    user-select: none;
    -webkit-user-select: none;
}

.home-card:active {
    transform: scale(0.96);
    box-shadow: var(--card-shadow-hover);
}

.home-card-icon { font-size: 40px; margin-bottom: 8px; }

.home-card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
}

.home-card-desc {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
}

.home-today {
    margin: 0 16px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--card-shadow);
}

.home-today h3 {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 10px;
}

.home-today .today-status {
    font-size: 14px;
    color: var(--primary);
    font-weight: 600;
}

.home-backup {
    margin: 20px 16px 0;
    display: flex;
    gap: 10px;
}

.home-backup .btn {
    flex: 1;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
}

/* ========== Vocab Page ========== */
.vocab-toolbar {
    display: flex;
    gap: 10px;
    padding: 16px;
    position: sticky;
    top: 68px;
    z-index: 50;
    background: linear-gradient(180deg, var(--bg-mid) 60%, transparent);
    padding-bottom: 24px;
}

.vocab-search {
    flex: 1;
    height: 44px;
    border: 2px solid #E0E0E0;
    border-radius: var(--radius-sm);
    padding: 0 14px;
    font-size: 15px;
    font-family: var(--font-family);
    outline: none;
    transition: border-color 0.2s;
    background: white;
}

.vocab-search:focus { border-color: var(--primary-light); }

.vocab-import-btn {
    height: 44px;
    padding: 0 16px;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--font-family);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
}

.vocab-import-btn:active { opacity: 0.85; }

.vocab-list { padding: 0 16px; }

.vocab-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.15s;
}

.vocab-item:active { transform: scale(0.98); }

.vocab-item-main { flex: 1; min-width: 0; }

.vocab-item-en {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.vocab-item-cn {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
}

.vocab-item-stats {
    font-size: 11px;
    color: var(--text-light);
    white-space: nowrap;
}

.vocab-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
}

.vocab-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
.vocab-empty p { font-size: 14px; }

.vocab-count {
    text-align: center;
    padding: 8px;
    font-size: 13px;
    color: var(--text-light);
}

/* ========== Word Detail ========== */
.word-card-full {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 22px;
    margin: 16px;
    box-shadow: var(--card-shadow);
    text-align: center;
}

.word-en {
    font-size: 32px;
    font-weight: 800;
    color: var(--primary-dark);
    word-break: break-word;
}

.word-phonetic {
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-style: italic;
}

.btn-speak {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 12px;
    padding: 8px 20px;
    border: 2px solid var(--primary-light);
    border-radius: 24px;
    background: transparent;
    color: var(--primary);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font-family);
    cursor: pointer;
    transition: all 0.2s;
}

.btn-speak:active { background: var(--primary); color: white; }

.word-cn {
    font-size: 24px;
    font-weight: 700;
    color: var(--secondary);
    margin-top: 18px;
    padding-top: 18px;
    border-top: 2px dashed #EEE;
}

.word-explanation {
    text-align: left;
    margin-top: 18px;
    padding: 16px;
    background: #F8F6FF;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
}

.word-explanation h1,
.word-explanation h2,
.word-explanation h3 { color: var(--text-primary); margin: 10px 0 6px; }
.word-explanation p { margin: 6px 0; }
.word-explanation ul, .word-explanation ol { padding-left: 20px; }
.word-explanation code {
    background: #EDE7F6;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
}

.word-stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text-light);
}

.word-stats-bar span { display: flex; align-items: center; gap: 4px; }

.word-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    gap: 12px;
    background: var(--card-bg);
    border-top: 1px solid #F0E8FF;
    flex-shrink: 0;
}

.word-nav-info {
    font-size: 14px;
    color: var(--text-light);
    font-weight: 600;
}

/* ========== Plan Page ========== */
.plan-form {
    padding: 20px 16px;
}

.form-group {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: var(--card-shadow);
}

.form-label {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.form-hint {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 10px;
}

.form-input {
    width: 100%;
    height: 48px;
    border: 2px solid #E0E0E0;
    border-radius: var(--radius-sm);
    padding: 0 16px;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--font-family);
    color: var(--primary);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--primary-light); }

/* ========== Buttons ========== */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 24px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    font-family: var(--font-family);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
    text-decoration: none;
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(124, 77, 255, 0.3);
}

.btn-primary:active:not(:disabled) { transform: scale(0.97); }

.btn-secondary {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary-light);
}

.btn-success {
    background: linear-gradient(135deg, var(--success) 0%, #43A047 100%);
    color: white;
}

.btn-block { display: flex; width: 100%; }

.btn-large { padding: 16px 32px; font-size: 18px; border-radius: var(--radius-md); }

.btn-round { border-radius: 50px; }

/* ========== Learn Page ========== */
.learn-container { padding: 20px 16px; }

.learn-phase-icon {
    text-align: center;
    font-size: 56px;
    margin: 20px 0 12px;
    line-height: 1;
}

.learn-phase-title {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.learn-phase-desc {
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.6;
}

.learn-progress-bar {
    height: 8px;
    background: #E8E0FF;
    border-radius: 4px;
    margin: 16px 0;
    overflow: hidden;
}

.learn-progress-bar .fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transition: width 0.4s ease;
}

.learn-progress-text {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 16px;
}

/* Preview card in learning */
.preview-card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 20px;
    box-shadow: var(--card-shadow);
    text-align: center;
    animation: slideUp 0.3s ease;
}


/* Test question */
.test-type-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 16px;
}

.test-type-badge.en2cn { background: #E8EAF6; color: var(--primary); }
.test-type-badge.cn2en { background: #FCE4EC; color: var(--secondary); }

.test-question-card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 20px;
    box-shadow: var(--card-shadow);
    text-align: center;
    margin-bottom: 20px;
    transition: all 0.3s;
}

.test-question-card.correct-flash {
    box-shadow: 0 0 0 3px var(--success), var(--card-shadow);
}

.test-question-card.wrong-flash {
    box-shadow: 0 0 0 3px var(--error), var(--card-shadow);
    animation: shake 0.4s ease;
}

.test-prompt {
    font-size: 28px;
    font-weight: 800;
    color: var(--text-primary);
    word-break: break-word;
}

.test-prompt-sub {
    font-size: 14px;
    color: var(--text-light);
    margin-top: 6px;
}

.test-options { display: flex; flex-direction: column; gap: 10px; }

.option-btn {
    width: 100%;
    padding: 16px 20px;
    border: 2px solid #E8E0FF;
    border-radius: var(--radius-md);
    background: white;
    font-size: 17px;
    font-weight: 600;
    font-family: var(--font-family);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
}

.option-btn:active:not(.disabled) { border-color: var(--primary); background: #F5F0FF; }

.option-btn.selected-correct {
    border-color: var(--success);
    background: #E8F5E9;
    color: var(--success);
}

.option-btn.selected-wrong {
    border-color: var(--error);
    background: #FFEBEE;
    color: var(--error);
}

.option-btn.show-correct {
    border-color: var(--success);
    background: #E8F5E9;
    color: var(--success);
}

.option-btn.disabled { pointer-events: none; opacity: 0.7; }

.test-input-group {
    display: flex;
    gap: 10px;
    margin-top: 4px;
}

.test-input {
    flex: 1;
    height: 52px;
    border: 2px solid #E0E0E0;
    border-radius: var(--radius-sm);
    padding: 0 16px;
    font-size: 18px;
    font-weight: 600;
    font-family: var(--font-family);
    outline: none;
    transition: border-color 0.2s;
}

.test-input:focus { border-color: var(--primary-light); }
.test-input.correct { border-color: var(--success); background: #E8F5E9; }
.test-input.wrong { border-color: var(--error); background: #FFEBEE; }

.test-feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    animation: slideUp 0.2s ease;
}

.test-feedback.correct { background: #E8F5E9; color: var(--success); }
.test-feedback.wrong { background: #FFEBEE; color: var(--error); }

.test-next-btn {
    margin-top: 20px;
    text-align: center;
    animation: fadeIn 0.3s ease;
}

/* Review */
.review-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 20px 0;
}

.review-stat {
    text-align: center;
    padding: 16px 24px;
    border-radius: var(--radius-md);
    min-width: 100px;
}

.review-stat.correct { background: #E8F5E9; }
.review-stat.wrong { background: #FFEBEE; }

.review-stat .num {
    font-size: 32px;
    font-weight: 800;
}

.review-stat.correct .num { color: var(--success); }
.review-stat.wrong .num { color: var(--error); }

.review-stat .label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
}

.wrong-list {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin: 16px 0;
    box-shadow: var(--card-shadow);
}

.wrong-list h3 {
    font-size: 15px;
    color: var(--error);
    margin-bottom: 12px;
}

.wrong-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #F5F5F5;
    font-size: 14px;
}

.wrong-item:last-child { border-bottom: none; }

.wrong-item-word { font-weight: 700; color: var(--text-primary); }
.wrong-item-answer { color: var(--text-light); font-size: 13px; }

/* Complete celebration */
.celebrate-stars {
    text-align: center;
    font-size: 48px;
    letter-spacing: 8px;
    animation: bounce 0.6s ease;
}

/* ========== History Page ========== */
.history-list { padding: 0 16px; }

.scroll-loader {
    text-align: center;
    padding: 20px 0;
    color: var(--text-light);
    font-size: 14px;
}

.scroll-loader.hidden { display: none; }

.history-item {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.15s;
}

.history-item:active { transform: scale(0.98); }

.history-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-date { font-size: 15px; font-weight: 700; color: var(--text-primary); }

.history-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
}

.history-badge.completed { background: #E8F5E9; color: var(--success); }
.history-badge.in_progress { background: #FFF3E0; color: var(--warning); }
.history-badge.missed { background: #FFEBEE; color: var(--error); }

.history-detail {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #F0F0F0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.8;
    display: none;
}

.history-item.expanded .history-detail { display: block; }

.history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
}

.history-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }

/* ========== Toast ========== */
#toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    max-width: 420px;
    width: 90%;
}

.toast {
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;

<script>
/* ==========================================================================
   UTILITY FUNCTIONS
   ========================================================================== */

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function getToday() {
    return new Date().toISOString().split('T')[0];
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getMonth() + 1}月${d.getDate()}日`;
}

function daysBetween(d1, d2) {
    const date1 = new Date(d1 + 'T00:00:00');
    const date2 = new Date(d2 + 'T00:00:00');
    return Math.floor((date2 - date1) / (1000 * 60 * 60 * 24));
}

function addDays(dateStr, days) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().split('T')[0];
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

/* ==========================================================================
   STORAGE LAYER  (IndexedDB with in-memory cache)
   ========================================================================== */

const DB_NAME = 'rtsw_db';
const DB_VERSION = 1;
const STORE_NAME = 'kv';

const KEYS = {
    WORDS: 'rtsw_words',
    PLAN: 'rtsw_plan',
    SESSIONS: 'rtsw_sessions',
    CURRENT: 'rtsw_current',
};

const Storage = {
    _db: null,
    _cache: {},

    async openDB() {
        if (this._db) return this._db;
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = () => {
                const db = req.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            req.onsuccess = () => { this._db = req.result; resolve(this._db); };
            req.onerror = () => reject(req.error);
        });
    },

    async init() {
        const db = await this.openDB();

        const migratedFlag = '__rtsw_migrated';
        if (!localStorage.getItem(migratedFlag)) {
            const keysToMigrate = Object.values(KEYS);
            for (const key of keysToMigrate) {
                const raw = localStorage.getItem(key);
                if (raw !== null) {
                    try {
                        const val = JSON.parse(raw);
                        this._cache[key] = val;
                    } catch { /* skip bad data */ }
                }
            }
            if (Object.keys(this._cache).length > 0) {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                for (const [k, v] of Object.entries(this._cache)) {
                    store.put(v, k);
                }
                await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
            }
            localStorage.setItem(migratedFlag, '1');
        }

        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const allKeys = await new Promise((res, rej) => {
            const r = store.getAllKeys();
            r.onsuccess = () => res(r.result);
            r.onerror = rej;
        });
        for (const key of allKeys) {
            const val = await new Promise((res, rej) => {
                const r = store.get(key);
                r.onsuccess = () => res(r.result);
                r.onerror = rej;
            });
            this._cache[key] = val;
        }
    },

    get(key, fallback = null) {
        const val = this._cache[key];
        return val !== undefined ? val : fallback;
    },

    set(key, value) {
        this._cache[key] = value;
        this._persistKey(key, value);
    },

    remove(key) {
        delete this._cache[key];
        this._deleteKey(key);
    },

    _persistKey(key, value) {
        if (!this._db) return;
        const tx = this._db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(value, key);
    },

    _deleteKey(key) {
        if (!this._db) return;
        const tx = this._db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).delete(key);
    },

    async exportAll() {
        const data = {};
        for (const key of Object.values(KEYS)) {
            const val = this.get(key);
            if (val !== null) data[key] = val;
        }
        return data;
    },

    async importAll(data) {
        for (const [key, val] of Object.entries(data)) {
            if (Object.values(KEYS).includes(key)) {
                this.set(key, val);
            }
        }
    }
};

/* ==========================================================================
   WORD STORE
   ========================================================================== */

const WordStore = {
    _cache: null,

    getAll() {
        if (!this._cache) this._cache = Storage.get(KEYS.WORDS, {});
        return this._cache;
    },

    get(english) {
        return this.getAll()[english] || null;
    },

    count() {
        return Object.keys(this.getAll()).length;
    },

    save(words) {
        this._cache = words;
        Storage.set(KEYS.WORDS, words);
    },

    upsert(english, chinese, phonetic, explanation) {
        const words = this.getAll();
        const existing = words[english];
        words[english] = {
            english,
            chinese,
            phonetic,
            explanation,
            stats: existing ? existing.stats : {
                reviewCount: 0,
                correctCount: 0,
                wrongCount: 0,
                lastReviewTime: null,
                nextReviewTime: null,
                easeFactor: 2.5,
                interval: 0,
            }
        };
        this.save(words);
    },

    updateStats(english, correct) {
        const words = this.getAll();
        const word = words[english];
        if (!word) return;

        const s = word.stats;
        s.reviewCount++;
        s.lastReviewTime = new Date().toISOString();

        if (correct) {
            s.correctCount++;
            s.easeFactor = Math.min(3.0, s.easeFactor + 0.1);
            if (s.interval === 0) s.interval = 1;
            else if (s.interval === 1) s.interval = 3;
            else s.interval = Math.round(s.interval * s.easeFactor);
            s.nextReviewTime = addDays(getToday(), s.interval);
        } else {
            s.wrongCount++;
            s.easeFactor = Math.max(1.3, s.easeFactor - 0.3);
            s.interval = 1;
            s.nextReviewTime = addDays(getToday(), 1);
        }

        this.save(words);
    },

    getSortedList() {
        return Object.values(this.getAll()).sort((a, b) =>
            a.english.localeCompare(b.english)
        );
    },

    search(query) {
        const q = query.toLowerCase().trim();
        if (!q) return this.getSortedList();
        return this.getSortedList().filter(w =>
            w.english.toLowerCase().includes(q) ||
            w.chinese.includes(q) ||
            w.phonetic.toLowerCase().includes(q)
        );
    }
};

/* ==========================================================================
   PLAN STORE
   ========================================================================== */

const PlanStore = {
    get() {
        return Storage.get(KEYS.PLAN, null);
    },

    save(plan) {
        Storage.set(KEYS.PLAN, {
            cycleDays: plan.cycleDays || 1,
            englishToChineseCount: plan.englishToChineseCount || 10,
            chineseToEnglishCount: plan.chineseToEnglishCount || 10,
            lastGeneratedDate: plan.lastGeneratedDate || null,
            updatedAt: Date.now(),
        });
    },

    updateLastGenerated(date) {
        const plan = this.get();
        if (plan) {
            plan.lastGeneratedDate = date;
            Storage.set(KEYS.PLAN, plan);
        }
    }
};

/* ==========================================================================
   SESSION STORE
   ========================================================================== */

const SessionStore = {
    getAll() {
        return Storage.get(KEYS.SESSIONS, []);
    },

    save(sessions) {
        Storage.set(KEYS.SESSIONS, sessions);
    },

    getByDate(date) {
        return this.getAll().find(s => s.date === date) || null;
    },

    getToday() {
        return this.getByDate(getToday());
    },

    createOrUpdate(session) {
        const sessions = this.getAll();
        const idx = sessions.findIndex(s => s.date === session.date);
        if (idx >= 0) sessions[idx] = session;
        else sessions.push(session);
        this.save(sessions);
        return session;
    },

    markMissed(date) {
        const existing = this.getByDate(date);
        if (existing && existing.status !== 'completed') {
            existing.status = 'missed';
            this.createOrUpdate(existing);
        } else if (!existing) {
            this.createOrUpdate({
                date,
                status: 'missed',
                words: [],
                rounds: [],
                totalRounds: 0,
                planSnapshot: PlanStore.get(),
            });
        }
    }
};

/* ==========================================================================
   SPACED REPETITION
   ========================================================================== */

const SpacedRepetition = {
    selectWords(totalNeeded) {
        const words = WordStore.getAll();
        const wordList = Object.values(words);
        if (wordList.length === 0) return [];

        const today = getToday();
        const todayMs = new Date(today + 'T00:00:00').getTime();

        const scored = wordList.map(w => {
            const s = w.stats;
            let score;

            if (s.reviewCount === 0) {
                score = -1000 + Math.random() * 10;
            } else if (s.nextReviewTime && new Date(s.nextReviewTime + 'T00:00:00').getTime() <= todayMs) {
                const overdueDays = daysBetween(s.nextReviewTime, today);
                score = -500 + Math.max(0, 100 - overdueDays) + Math.random() * 5;
            } else {
                const accuracy = s.correctCount / Math.max(1, s.reviewCount);
                const daysUntil = s.nextReviewTime ? daysBetween(today, s.nextReviewTime) : 0;
                score = daysUntil * 10 + accuracy * 50 + Math.random() * 5;
            }

            return { word: w.english, score };
        });

        scored.sort((a, b) => a.score - b.score);
        return scored.slice(0, Math.min(totalNeeded, scored.length)).map(s => s.word);
    }
};

/* ==========================================================================
   TEXT-TO-SPEECH
   ========================================================================== */

function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.75;
    u.pitch = 1.1;
    window.speechSynthesis.speak(u);
}

/* ==========================================================================
   TOAST
   ========================================================================== */

function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 2200);
}

/* ==========================================================================
   ROUTER
   ========================================================================== */

function navigate(hash) {
    window.location.hash = hash;
}

function getRoute() {
    const hash = window.location.hash.slice(1) || 'home';
    const idx = hash.indexOf('/');
    if (idx === -1) return { page: hash, param: '' };
    return { page: hash.substring(0, idx), param: decodeURIComponent(hash.substring(idx + 1)) };
}

function onRoute() {
    const { page, param } = getRoute();

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(`page-${page}`);
    if (!target) { navigate('home'); return; }
    target.classList.add('active');

    switch (page) {
        case 'home': renderHome(); break;
        case 'vocab': renderVocab(); break;
        case 'word': renderWord(param); break;
        case 'plan': renderPlan(); break;
        case 'learn': renderLearn(); break;
        case 'history': renderHistory(); break;
        default: navigate('home');
    }
}

/* ==========================================================================
   CSV IMPORT
   ========================================================================== */

function triggerImport() {
    document.getElementById('csv-file-input').click();
}

function handleCSVImport(file) {
    Papa.parse(file, {
        header: false,
        skipEmptyLines: true,
        complete(results) {
            let added = 0, updated = 0, skipped = 0;

            for (const row of results.data) {
                if (row.length < 2) { skipped++; continue; }

                const english = (row[0] || '').trim();
                if (!english) { skipped++; continue; }

                const lower = english.toLowerCase();
                if (['英文', 'english', 'word', '单词'].includes(lower)) continue;

                const chinese = (row[1] || '').trim();
                const phonetic = (row[2] || '').trim();
                const explanation = row.slice(3).join(',').trim();

                const isNew = !WordStore.get(english);
                WordStore.upsert(english, chinese, phonetic, explanation);
                if (isNew) added++; else updated++;
            }

            showToast(`导入完成：${added} 个新词，${updated} 个更新，${skipped} 个跳过`, 'success');
            renderVocab();
        },
        error() {
            showToast('CSV 解析失败，请检查文件格式', 'error');
        }
    });
}

document.getElementById('csv-file-input').addEventListener('change', function() {
    if (this.files.length > 0) {
        handleCSVImport(this.files[0]);
        this.value = '';
    }
});

/* ==========================================================================
   HOME PAGE
   ========================================================================== */

function renderHome() {
    const wordCount = WordStore.count();
    const plan = PlanStore.get();
    const todaySession = SessionStore.getToday();

    let todayStatus = '今日待学习';

    } else if (wordCount === 0) {
        todayStatus = '请先导入词库';
    } else if (!plan) {
        todayStatus = '请先设置计划';
    }

    document.getElementById('page-home').innerHTML = `
        <div class="page-header">
            <div class="header-btn invisible"></div>
            <h1>记单词小助手</h1>
            <div class="header-btn invisible"></div>
        </div>
        <div class="home-welcome">
            <div class="mascot">📖</div>
            <h2>每天进步一点点</h2>
            <p>坚持背单词，你是最棒的！</p>
        </div>
        <div class="home-grid">
            <div class="home-card" onclick="navigate('vocab')">
                <div class="home-card-icon">📚</div>
                <div class="home-card-title">我的词库</div>
                <div class="home-card-desc">${wordCount} 个单词</div>

            <div class="home-card" onclick="navigate('plan')">

            </div>
            <div class="home-card" onclick="navigate('learn')">

            </div>
            <div class="home-card" onclick="navigate('history')">
                <div class="home-card-icon">📊</div>

            </div>
        </div>
        ${todaySession && todaySession.status === 'completed' ? `
        <div class="home-today">

        <div class="home-backup">
            <button class="btn btn-secondary" onclick="exportBackup()">💾 导出备份</button>
            <button class="btn btn-secondary" onclick="document.getElementById('backup-file-input').click()">📂 导入恢复</button>
        </div>
    `;
}

/* ==========================================================================
   VOCAB PAGE  (infinite scroll)
   ========================================================================== */

let vocabSearchQuery = '';
const VOCAB_PAGE_SIZE = 30;
let vocabAllWords = [];
let vocabRenderedCount = 0;
let vocabScrollObserver = null;

function renderVocabItemHtml(w) {
    const s = w.stats;
    let statsText = '未学习';
    if (s.reviewCount > 0) {
        const acc = Math.round(s.correctCount / s.reviewCount * 100);
        statsText = `${acc}% · ${s.reviewCount}次`;
    }
    return `
    <div class="vocab-item" onclick="navigate('word/${encodeURIComponent(w.english)}')">
        <div class="vocab-item-main">
            <div class="vocab-item-en">${escapeHtml(w.english)}</div>
            <div class="vocab-item-cn">${escapeHtml(w.chinese)}</div>
        </div>
        <div class="vocab-item-stats">${statsText}</div>
    </div>`;
}

function vocabLoadMore() {
    const itemsEl = document.getElementById('vocab-items');
    const loaderEl = document.getElementById('vocab-loader');
    if (!itemsEl || vocabRenderedCount >= vocabAllWords.length) {
        if (loaderEl) loaderEl.classList.add('hidden');
        return;
    }
    const batch = vocabAllWords.slice(vocabRenderedCount, vocabRenderedCount + VOCAB_PAGE_SIZE);
    itemsEl.insertAdjacentHTML('beforeend', batch.map(renderVocabItemHtml).join(''));
    vocabRenderedCount += batch.length;
    if (vocabRenderedCount >= vocabAllWords.length && loaderEl) {
        loaderEl.classList.add('hidden');
    }
}

function setupVocabScroll() {
    if (vocabScrollObserver) vocabScrollObserver.disconnect();
    const loaderEl = document.getElementById('vocab-loader');
    if (!loaderEl) return;
    vocabScrollObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) vocabLoadMore();
    }, { rootMargin: '200px' });
    vocabScrollObserver.observe(loaderEl);
}

function renderVocab() {
    const total = WordStore.count();

    document.getElementById('page-vocab').innerHTML = `
        <div class="page-header">
            <button class="header-btn" onclick="navigate('home')">←</button>
            <h1>我的词库</h1>
            <div class="header-btn invisible"></div>
        </div>
        <div class="vocab-toolbar">
            <input class="vocab-search" type="text" placeholder="搜索单词..."
                value="${escapeHtml(vocabSearchQuery)}"
                oninput="vocabSearchQuery=this.value; renderVocabList();">
            <button class="vocab-import-btn" onclick="triggerImport()">+ 导入</button>
        </div>
        <div class="vocab-list" id="vocab-list-container"></div>
    `;
    renderVocabList();
}

function renderVocabList() {
    vocabAllWords = WordStore.search(vocabSearchQuery);
    vocabRenderedCount = 0;
    const container = document.getElementById('vocab-list-container');
    if (!container) return;

    const total = WordStore.count();
    if (total === 0) {
        container.innerHTML = `
            <div class="vocab-empty">
                <div class="empty-icon">📭</div>
                <p>词库还是空的哦</p>
                <p>点击上方「导入」按钮添加单词</p>
            </div>`;
        return;
    }
    if (vocabAllWords.length === 0) {
        container.innerHTML = `
            <div class="vocab-empty">
                <div class="empty-icon">🔍</div>
                <p>没有找到匹配的单词</p>
            </div>`;
        return;
    }

    container.innerHTML = `
        <div class="vocab-count">共 ${vocabAllWords.length} 个单词</div>
        <div id="vocab-items"></div>
        <div id="vocab-loader" class="scroll-loader">加载更多...</div>
    `;
    vocabLoadMore();
    setupVocabScroll();
}

/* ==========================================================================
   WORD DETAIL PAGE
   ========================================================================== */

let vocabWordList = [];

function renderWord(english) {
    const word = WordStore.get(english);
    if (!word) {
        showToast('单词不存在', 'error');
        navigate('vocab');
        return;
    }

    vocabWordList = WordStore.getSortedList().map(w => w.english);
    const idx = vocabWordList.indexOf(english);
    const s = word.stats;

    const explanationHtml = word.explanation
        ? marked.parse(word.explanation)
        : '<p style="color:var(--text-light)">暂无详细解释</p>';

    document.getElementById('page-word').innerHTML = `
        <div class="page-header">
            <button class="header-btn" onclick="navigate('vocab')">←</button>
            <h1>单词详情</h1>
            <div class="header-btn invisible"></div>
        </div>
        <div class="word-scroll">
            <div class="word-card-full">
                <div class="word-en">${escapeHtml(word.english)}</div>
                <div class="word-phonetic">${escapeHtml(word.phonetic || '')}</div>
                <button class="btn-speak" onclick="speak('${escapeHtml(word.english)}')">🔊 发音</button>
                <div class="word-cn">${escapeHtml(word.chinese)}</div>
                <div class="word-explanation">${explanationHtml}</div>
                <div class="word-stats-bar">
                    <span>📖 学习 ${s.reviewCount} 次</span>
                    <span>✓ 正确 ${s.correctCount}</span>
                    <span>✗ 错误 ${s.wrongCount}</span>
                </div>
            </div>
        </div>
        <div class="word-nav">
            <button class="btn btn-secondary btn-round" onclick="navigateWord(-1)" ${idx <= 0 ? 'disabled' : ''}>
                ← 上一个
            </button>
            <span class="word-nav-info">${idx + 1} / ${vocabWordList.length}</span>
            <button class="btn btn-secondary btn-round" onclick="navigateWord(1)" ${idx >= vocabWordList.length - 1 ? 'disabled' : ''}>
                下一个 →
            </button>
        </div>
    `;
}

function navigateWord(direction) {
    const currentRoute = getRoute();
    const currentWord = currentRoute.param;
    const idx = vocabWordList.indexOf(currentWord);
    const newIdx = idx + direction;
    if (newIdx >= 0 && newIdx < vocabWordList.length) {
        navigate('word/' + encodeURIComponent(vocabWordList[newIdx]));
    }
}

/* ==========================================================================
   LEARNING FLOW
   ========================================================================== */

let learnState = null;

function renderLearn() {
    const container = document.getElementById('page-learn');

    const headerHtml = `
        <div class="page-header">
            <button class="header-btn" onclick="exitLearn()">←</button>
            <h1>开始学习</h1>
            <div class="header-btn invisible"></div>
        </div>`;

    if (WordStore.count() === 0) {
        container.innerHTML = headerHtml + `
            <div class="learn-container">
                <div class="info-box">
                    <div class="icon">📭</div>
                    <p>词库还是空的哦</p>
                    <p>先去导入一些单词吧</p>
                    <button class="btn btn-primary mt-16" onclick="navigate('vocab')">去导入词库</button>
                </div>
            </div>`;
        return;
    }

    const plan = PlanStore.get();
    if (!plan) {
        container.innerHTML = headerHtml + `
            <div class="learn-container">
                <div class="info-box">
                    <div class="icon">📋</div>
                    <p>还没有设置学习计划</p>
                    <p>先设置一个适合你的计划吧</p>
                    <button class="btn btn-primary mt-16" onclick="navigate('plan')">去设置计划</button>
                </div>
            </div>`;
        return;
    }

    const todaySession = SessionStore.getToday();
    if (todaySession && todaySession.status === 'completed') {
        container.innerHTML = headerHtml + `
            <div class="learn-container">
                <div class="info-box">
                    <div class="icon">🎉</div>
                    <p style="font-size:18px;font-weight:700;color:var(--success)">今日学习已完成！</p>
                    <p>学习了 ${todaySession.words.length} 个单词</p>
                    <p>用了 ${todaySession.totalRounds} 轮完成</p>
                    <button class="btn btn-secondary mt-16" onclick="navigate('home')">返回首页</button>
                </div>
            </div>`;
        return;
    }

    if (!learnState || learnState.date !== getToday()) {
        initLearnSession(plan);
    }

    if (!learnState) {
        container.innerHTML = headerHtml + `
            <div class="learn-container">
                <div class="info-box">
                    <div class="icon">🌟</div>
                    <p style="font-size:18px;font-weight:700;color:var(--primary)">暂时没有需要学习的单词</p>
                    <p>所有单词都还没到复习时间</p>
                    <p>可以去词库看看，或明天再来</p>
                    <button class="btn btn-secondary mt-16" onclick="navigate('home')">返回首页</button>
                </div>
            </div>`;
        return;
    }

    container.innerHTML = headerHtml + `<div class="learn-container" id="learn-content"></div><div class="learn-bottom-nav" id="learn-bottom-nav" style="display:none"></div>`;
    renderLearnPhase();
}

function initLearnSession(plan) {
    const en2cnCount = plan.englishToChineseCount;
    const cn2enCount = plan.chineseToEnglishCount;
    const totalNeeded = Math.max(en2cnCount, cn2enCount);
    const selectedWords = SpacedRepetition.selectWords(totalNeeded);

    if (selectedWords.length === 0) {
        learnState = null;
        return;
    }

    const en2cnWords = selectedWords.slice(0, Math.min(en2cnCount, selectedWords.length));
    const cn2enWords = selectedWords.slice(0, Math.min(cn2enCount, selectedWords.length));
    const allWords = [...new Set([...en2cnWords, ...cn2enWords])];

    learnState = {
        date: getToday(),
        phase: 'preview',
        allWords,
        en2cnWords,
        cn2enWords,
        previewIndex: 0,
        questions: [],
        questionIndex: 0,
        results: [],
        roundNumber: 1,
        rounds: [],
        showFeedback: false,
    };

    const session = SessionStore.getToday();
    if (!session || session.status !== 'in_progress') {
        SessionStore.createOrUpdate({
            date: getToday(),
            status: 'in_progress',
            words: allWords,
            rounds: [],
            totalRounds: 0,
            planSnapshot: { ...plan },
        });
    }

    PlanStore.updateLastGenerated(getToday());
}

function renderLearnPhase() {
    if (!learnState) return;
    const el = document.getElementById('learn-content');
    if (!el) return;

    const bottomNav = document.getElementById('learn-bottom-nav');
    if (bottomNav && learnState.phase !== 'preview') {
        bottomNav.style.display = 'none';
    }

    switch (learnState.phase) {
        case 'preview': renderPreview(el); break;
        case 'confirm': renderConfirm(el); break;
        case 'test': renderTest(el); break;
        case 'review': renderReview(el); break;
        case 'complete': renderComplete(el); break;
    }
}

/* ---------- Preview ---------- */

function renderPreview(el) {
    const words = learnState.allWords;
    const idx = learnState.previewIndex;
    const word = WordStore.get(words[idx]);
    if (!word) return;

    const progress = ((idx + 1) / words.length * 100).toFixed(0);
    const explanationHtml = word.explanation ? marked.parse(word.explanation) : '';
    const roundLabel = learnState.roundNumber > 1 ? `（第 ${learnState.roundNumber} 轮 · 错题复习）` : '';

    el.innerHTML = `
        <div class="learn-progress-text">预习 ${idx + 1} / ${words.length} ${roundLabel}</div>
        <div class="learn-progress-bar"><div class="fill" style="width:${progress}%"></div></div>
        <div class="preview-card">
            <div class="word-en">${escapeHtml(word.english)}</div>
            <div class="word-phonetic">${escapeHtml(word.phonetic || '')}</div>
            <button class="btn-speak" onclick="speak('${escapeHtml(word.english)}')">🔊 发音</button>
            <div class="word-cn">${escapeHtml(word.chinese)}</div>
            ${explanationHtml ? `<div class="word-explanation">${explanationHtml}</div>` : ''}
        </div>
    `;

    const bottomNav = document.getElementById('learn-bottom-nav');
    if (bottomNav) {
        bottomNav.style.display = '';
        bottomNav.innerHTML = `
            <button class="btn btn-secondary btn-round" onclick="previewPrev()" ${idx <= 0 ? 'disabled' : ''}>
                ← 上一个
            </button>
            <button class="btn btn-primary btn-round" onclick="previewNext()">
                ${idx >= words.length - 1 ? '完成预习 ✓' : '下一个 →'}
            </button>
        `;
    }

    speak(word.english);
}

function previewPrev() {
    if (!learnState || learnState.previewIndex <= 0) return;
    learnState.previewIndex--;
    renderLearnPhase();
}

function previewNext() {
    if (!learnState) return;
    if (learnState.previewIndex >= learnState.allWords.length - 1) {
        learnState.phase = 'confirm';
        renderLearnPhase();
    } else {
        learnState.previewIndex++;
        renderLearnPhase();
    }
}

/* ---------- Confirm ---------- */

function renderConfirm(el) {
    const roundLabel = learnState.roundNumber > 1 ? `（第 ${learnState.roundNumber} 轮）` : '';
    el.innerHTML = `
        <div class="learn-phase-icon">📝</div>
        <div class="learn-phase-title">准备好了吗？${roundLabel}</div>
        <div class="learn-phase-desc">
            你刚刚预习了 <strong>${learnState.allWords.length}</strong> 个单词<br>
            接下来进行测试：<br>
            看英文选中文：<strong>${learnState.en2cnWords.length}</strong> 题<br>
            看中文写英文：<strong>${learnState.cn2enWords.length}</strong> 题
        </div>
        <div class="text-center">
            <button class="btn btn-primary btn-large" onclick="startTest()">开始测试！</button>
        </div>
    `;
}

/* ---------- Test ---------- */

function startTest() {
    if (!learnState) return;

    const questions = [];
    const allWords = WordStore.getAll();
    const allWordList = Object.values(allWords);

    for (const eng of shuffle(learnState.en2cnWords)) {
        const word = allWords[eng];
        if (!word) continue;
        const distractors = shuffle(
            allWordList.filter(w => w.english !== eng)
        ).slice(0, 2).map(w => w.chinese);

        if (distractors.length < 2) {
            const fallbacks = ['???', '???'];
            while (distractors.length < 2) distractors.push(fallbacks.shift());
        }

        questions.push({
            type: 'en2cn',
            word: eng,
            prompt: word.english,
            answer: word.chinese,
            options: shuffle([word.chinese, ...distractors]),
            phonetic: word.phonetic || '',
        });
    }

    for (const eng of shuffle(learnState.cn2enWords)) {
        const word = allWords[eng];
        if (!word) continue;
        questions.push({
            type: 'cn2en',
            word: eng,
            prompt: word.chinese,
            answer: word.english,
        });
    }

    learnState.questions = questions;
    learnState.questionIndex = 0;
    learnState.results = [];
    learnState.showFeedback = false;
    learnState.phase = 'test';
    renderLearnPhase();
}

function renderTest(el) {
    const q = learnState.questions[learnState.questionIndex];
    if (!q) return;

    const total = learnState.questions.length;
    const current = learnState.questionIndex + 1;
    const progress = (current / total * 100).toFixed(0);

    let questionHtml;

    if (q.type === 'en2cn') {
        const optionsHtml = q.options.map((opt, i) => {
            let cls = 'option-btn';
            if (learnState.showFeedback) {
                cls += ' disabled';
                if (opt === q.answer) cls += ' show-correct';
                if (learnState.selectedOption === i && opt !== q.answer) cls += ' selected-wrong';
                if (learnState.selectedOption === i && opt === q.answer) cls = 'option-btn disabled selected-correct';
            }
            return `<button class="${cls}" onclick="selectOption(${i})">${escapeHtml(opt)}</button>`;
        }).join('');

        questionHtml = `
            <div class="text-center mb-16">
                <span class="test-type-badge en2cn">看英文选中文</span>
            </div>
            <div class="test-question-card ${learnState.showFeedback ? (learnState.lastCorrect ? 'correct-flash' : 'wrong-flash') : ''}" id="test-card">
                <div class="test-prompt">${escapeHtml(q.prompt)}</div>
                <div class="test-prompt-sub">${escapeHtml(q.phonetic)}</div>
                <button class="btn-speak" onclick="speak('${escapeHtml(q.prompt)}')" style="margin-top:10px">🔊</button>
            </div>
            <div class="test-options">${optionsHtml}</div>`;
    } else {
        let inputClass = 'test-input';
        let inputValue = learnState.typedAnswer || '';
        let feedbackHtml = '';

        if (learnState.showFeedback) {
            inputClass += learnState.lastCorrect ? ' correct' : ' wrong';
            if (learnState.lastCorrect) {
                feedbackHtml = `<div class="test-feedback correct">太棒了！回答正确 ✓</div>`;
            } else {
                feedbackHtml = `<div class="test-feedback wrong">正确答案是：<strong>${escapeHtml(q.answer)}</strong></div>`;
            }
        }

        questionHtml = `
            <div class="text-center mb-16">
                <span class="test-type-badge cn2en">看中文写英文</span>
            </div>
            <div class="test-question-card ${learnState.showFeedback ? (learnState.lastCorrect ? 'correct-flash' : 'wrong-flash') : ''}" id="test-card">
                <div class="test-prompt">${escapeHtml(q.prompt)}</div>
            </div>
            <div class="test-input-group">
                <input class="${inputClass}" type="text" id="answer-input"
                    placeholder="输入英文单词" value="${escapeHtml(inputValue)}"
                    onkeydown="if(event.key==='Enter')submitTyping()"
                    ${learnState.showFeedback ? 'disabled' : ''} autocomplete="off" autocapitalize="off">
                ${!learnState.showFeedback ? `<button class="btn btn-primary" onclick="submitTyping()">提交</button>` : ''}
            </div>
            ${feedbackHtml}`;
    }

    const feedbackNav = learnState.showFeedback
        ? `<div class="test-next-btn"><button class="btn btn-primary btn-block" onclick="nextQuestion()">下一题 →</button></div>`
        : '';

    el.innerHTML = `
        <div class="learn-progress-text">第 ${current} 题 / 共 ${total} 题</div>
        <div class="learn-progress-bar"><div class="fill" style="width:${progress}%"></div></div>
        ${questionHtml}
        ${feedbackNav}
    `;

    if (q.type === 'en2cn' && !learnState.showFeedback) {
        speak(q.prompt);
    }

    if (q.type === 'cn2en' && !learnState.showFeedback) {
        setTimeout(() => {
            const input = document.getElementById('answer-input');
            if (input) input.focus();
        }, 100);
    }
}

function selectOption(index) {
    if (!learnState || learnState.showFeedback) return;
    const q = learnState.questions[learnState.questionIndex];
    const selected = q.options[index];
    const correct = selected === q.answer;

    learnState.showFeedback = true;
    learnState.selectedOption = index;
    learnState.lastCorrect = correct;
    learnState.results.push({ word: q.word, type: q.type, correct, userAnswer: selected });

    renderLearnPhase();
}

function submitTyping() {
    if (!learnState || learnState.showFeedback) return;
    const input = document.getElementById('answer-input');
    if (!input) return;
    const userAnswer = input.value.trim();
    if (!userAnswer) { showToast('请输入答案', 'warning'); return; }

    const q = learnState.questions[learnState.questionIndex];
    const correct = userAnswer.toLowerCase() === q.answer.toLowerCase();

    learnState.showFeedback = true;
    learnState.lastCorrect = correct;
    learnState.typedAnswer = userAnswer;
    learnState.results.push({ word: q.word, type: q.type, correct, userAnswer });

    renderLearnPhase();
}

function nextQuestion() {
    if (!learnState) return;
    learnState.showFeedback = false;
    learnState.selectedOption = null;
    learnState.lastCorrect = null;
    learnState.typedAnswer = '';
    learnState.questionIndex++;

    if (learnState.questionIndex >= learnState.questions.length) {
        finishRound();
    } else {
        renderLearnPhase();
    }
}

function finishRound() {
    const results = learnState.results;
    const correctCount = results.filter(r => r.correct).length;
    const wrongCount = results.filter(r => !r.correct).length;

    const round = {
        roundNumber: learnState.roundNumber,
        results: [...results],
        correctCount,
        wrongCount,
    };

    learnState.rounds.push(round);

    for (const r of results) {
        WordStore.updateStats(r.word, r.correct);
    }

    const wrongWords = [...new Set(results.filter(r => !r.correct).map(r => r.word))];

    if (wrongWords.length > 0) {
        learnState.phase = 'review';
        learnState.wrongWords = wrongWords;
    } else {
        learnState.phase = wrongCount === 0 && learnState.roundNumber === 1 ? 'complete' : 'review';
        learnState.wrongWords = [];
    }

    renderLearnPhase();
}

/* ---------- Review ---------- */

function renderReview(el) {
    const lastRound = learnState.rounds[learnState.rounds.length - 1];
    const hasWrong = learnState.wrongWords && learnState.wrongWords.length > 0;

    let wrongListHtml = '';
    if (hasWrong) {
        const wrongResults = lastRound.results.filter(r => !r.correct);
        wrongListHtml = `
            <div class="wrong-list">
                <h3>错题列表</h3>
                ${wrongResults.map(r => {
                    const word = WordStore.get(r.word);
                    return `
                    <div class="wrong-item">
                        <div>
                            <div class="wrong-item-word">${escapeHtml(r.word)} — ${escapeHtml(word ? word.chinese : '')}</div>
                            <div class="wrong-item-answer">你的答案：${escapeHtml(r.userAnswer)}</div>
                        </div>
                    </div>`;
                }).join('')}
            </div>`;
    }

    el.innerHTML = `
        <div class="learn-phase-icon">${hasWrong ? '💪' : '🎉'}</div>
        <div class="learn-phase-title">第 ${learnState.roundNumber} 轮测试结果</div>
        <div class="review-stats">
            <div class="review-stat correct">
                <div class="num">${lastRound.correctCount}</div>
                <div class="label">正确</div>
            </div>
            <div class="review-stat wrong">
                <div class="num">${lastRound.wrongCount}</div>
                <div class="label">错误</div>
            </div>
        </div>
        ${wrongListHtml}
        <div class="text-center mt-20">
            ${hasWrong
                ? `<button class="btn btn-primary btn-large" onclick="startErrorCorrection()">继续学习错题</button>`
                : `<button class="btn btn-success btn-large" onclick="completeLearning()">完成学习！</button>`
            }
        </div>
    `;

    if (!hasWrong) {
        setTimeout(() => fireConfetti(), 300);
    }
}

function startErrorCorrection() {
    if (!learnState) return;
    const wrongWords = learnState.wrongWords;

    learnState.roundNumber++;
    learnState.allWords = wrongWords;
    learnState.en2cnWords = wrongWords;
    learnState.cn2enWords = wrongWords;
    learnState.previewIndex = 0;
    learnState.phase = 'preview';

    renderLearnPhase();
}

/* ---------- Complete ---------- */

function renderComplete(el) {
    el.innerHTML = `
        <div class="learn-phase-icon">🏆</div>
        <div class="celebrate-stars">⭐🌟⭐</div>
        <div class="learn-phase-title">太棒了，全部完成！</div>
        <div class="learn-phase-desc">
            共学习了 <strong>${[...new Set(learnState.rounds[0].results.map(r => r.word))].length}</strong> 个单词<br>
            用了 <strong>${learnState.roundNumber}</strong> 轮完成
        </div>
        <div class="text-center mt-24">
            <button class="btn btn-primary btn-large" onclick="completeLearning()">返回首页</button>
        </div>
    `;
    fireConfetti();
}

function completeLearning() {
    if (learnState) {
        const session = SessionStore.getToday() || {};
        session.date = getToday();
        session.status = 'completed';
        session.rounds = learnState.rounds;
        session.totalRounds = learnState.roundNumber;
        session.words = learnState.rounds.length > 0
            ? [...new Set(learnState.rounds[0].results.map(r => r.word))]
            : learnState.allWords;
        session.planSnapshot = PlanStore.get();
        SessionStore.createOrUpdate(session);
    }

    learnState = null;
    navigate('home');
}

function exitLearn() {
    if (learnState && learnState.phase !== 'complete') {
        if (confirm('确定要退出学习吗？当前进度不会保存。')) {
            learnState = null;
            navigate('home');
        }
    } else {
        navigate('home');
    }
}

function fireConfetti() {
    if (typeof confetti !== 'function') return;
    confetti({ particleCount: 80, spread: 70, origin: { y: 0.65 }, colors: ['#7C4DFF', '#FF6B9D', '#66BB6A', '#FFA726', '#42A5F5'] });
    setTimeout(() => {
        confetti({ particleCount: 50, spread: 100, origin: { y: 0.55, x: 0.3 } });
    }, 250);
    setTimeout(() => {
        confetti({ particleCount: 50, spread: 100, origin: { y: 0.55, x: 0.7 } });
    }, 400);
}

/* ==========================================================================
   HISTORY PAGE

/* ---------- History Page (infinite scroll) ---------- */

const HISTORY_PAGE_SIZE = 30;
let historyAllSessions = [];
let historyRenderedCount = 0;
let historyScrollObserver = null;

function renderHistoryItemHtml(s) {
    const statusLabels = { completed: '已完成', in_progress: '进行中', missed: '已错过' };
    const statusLabel = statusLabels[s.status] || s.status;

    let detailHtml = '';
    if (s.status === 'completed' && s.rounds && s.rounds.length > 0) {
        const totalCorrect = s.rounds.reduce((sum, r) => sum + r.correctCount, 0);
        const totalWrong = s.rounds.reduce((sum, r) => sum + r.wrongCount, 0);
        detailHtml = `
            <div>单词数：${(s.words || []).length} 个</div>
            <div>学习轮次：${s.totalRounds || s.rounds.length} 轮</div>
            <div>总计：正确 ${totalCorrect} 次，错误 ${totalWrong} 次</div>
            ${s.rounds.map(r => `<div style="margin-top:4px;padding-left:8px;border-left:3px solid var(--primary-light)">
                第 ${r.roundNumber} 轮：✓ ${r.correctCount} / ✗ ${r.wrongCount}
            </div>`).join('')}
        `;
    } else if (s.status === 'missed') {
        detailHtml = '<div>该日未完成学习</div>';
    } else if (s.status === 'in_progress') {
        detailHtml = '<div>学习尚未完成</div>';
    }

    return `
    <div class="history-item" onclick="this.classList.toggle('expanded')">
        <div class="history-item-header">
            <span class="history-date">${formatDate(s.date)}</span>
            <span class="history-badge ${s.status}">${statusLabel}</span>
        </div>
        <div class="history-detail">${detailHtml}</div>
    </div>`;
}

function historyLoadMore() {
    const itemsEl = document.getElementById('history-items');
    const loaderEl = document.getElementById('history-loader');
    if (!itemsEl || historyRenderedCount >= historyAllSessions.length) {
        if (loaderEl) loaderEl.classList.add('hidden');
        return;
    }
    const batch = historyAllSessions.slice(historyRenderedCount, historyRenderedCount + HISTORY_PAGE_SIZE);
    itemsEl.insertAdjacentHTML('beforeend', batch.map(renderHistoryItemHtml).join(''));
    historyRenderedCount += batch.length;
    if (historyRenderedCount >= historyAllSessions.length && loaderEl) {
        loaderEl.classList.add('hidden');
    }
}

function setupHistoryScroll() {
    if (historyScrollObserver) historyScrollObserver.disconnect();
    const loaderEl = document.getElementById('history-loader');
    if (!loaderEl) return;
    historyScrollObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) historyLoadMore();
    }, { rootMargin: '200px' });
    historyScrollObserver.observe(loaderEl);
}

function renderHistory() {
    historyAllSessions = SessionStore.getAll().slice().reverse();
    historyRenderedCount = 0;

    let contentHtml;
    if (historyAllSessions.length === 0) {
        contentHtml = `
            <div class="history-empty">
                <div class="empty-icon">📅</div>
                <p>还没有学习记录</p>
                <p>开始你的第一次学习吧</p>
            </div>`;
    } else {
        contentHtml = `
            <div id="history-items"></div>
            <div id="history-loader" class="scroll-loader">加载更多...</div>
        `;
    }

    document.getElementById('page-history').innerHTML = `
        <div class="page-header">
            <button class="header-btn" onclick="navigate('home')">←</button>
            <h1>学习记录</h1>
            <div class="header-btn invisible"></div>
        </div>
        <div class="history-list" style="padding-top:16px">${contentHtml}</div>
    `;

    if (historyAllSessions.length > 0) {
        historyLoadMore();
        setupHistoryScroll();
    }
}

/* ==========================================================================
   SESSION CHECK (on app load)
   ========================================================================== */

function checkAndMarkMissedSessions() {
    const plan = PlanStore.get();
    if (!plan || !plan.lastGeneratedDate) return;

    const today = getToday();
    const lastGen = plan.lastGeneratedDate;

    if (lastGen === today) return;

    const diff = daysBetween(lastGen, today);

    for (let i = 0; i < diff; i++) {
        const date = addDays(lastGen, i);
        if (date === today) break;
        const session = SessionStore.getByDate(date);
        if (session && session.status === 'in_progress') {
            SessionStore.markMissed(date);
        } else if (!session && i % plan.cycleDays === 0 && i > 0) {
            SessionStore.markMissed(date);
        }
    }
}

/* ==========================================================================
   BACKUP / RESTORE
   ========================================================================== */

async function exportBackup() {
    try {
        const data = await Storage.exportAll();
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const date = new Date().toISOString().slice(0, 10);
        a.download = `remember-words-backup-${date}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        showToast('备份文件已下载', 'success');
    } catch (e) {
        showToast('导出失败：' + e.message, 'error');
    }
}

function importBackup(file) {
    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const data = JSON.parse(e.target.result);
            const validKeys = Object.values(KEYS);
            const keysFound = Object.keys(data).filter(k => validKeys.includes(k));
            if (keysFound.length === 0) {
                showToast('无效的备份文件', 'error');
                return;
            }
            await Storage.importAll(data);
            WordStore._cache = null;
            showToast(`恢复成功，已导入 ${keysFound.length} 项数据`, 'success');
            onRoute();
        } catch (err) {
            showToast('导入失败：文件格式错误', 'error');
        }
    };
    reader.readAsText(file);
}

document.getElementById('backup-file-input').addEventListener('change', function() {
    if (this.files.length > 0) {
        importBackup(this.files[0]);
        this.value = '';
    }
});

/* ==========================================================================
   INITIALIZATION
   ========================================================================== */

function autoImportFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const importFile = params.get('import');
    if (!importFile) return;

    if (params.get('clear') === '1') {
        WordStore.save({});
        SessionStore.save([]);
        Storage.remove(KEYS.CURRENT);
    }

    fetch(importFile)
        .then(r => r.text())
        .then(csv => {
            Papa.parse(csv, {
                header: false,
                skipEmptyLines: true,
                complete(results) {
                    let added = 0, updated = 0;
                    for (const row of results.data) {
                        if (row.length < 2) continue;
                        const english = (row[0] || '').trim();
                        if (!english || ['英文','english'].includes(english.toLowerCase())) continue;
                        const chinese = (row[1] || '').trim();
                        const phonetic = (row[2] || '').trim();
                        const explanation = row.slice(3).join(',').trim();
                        const isNew = !WordStore.get(english);
                        WordStore.upsert(english, chinese, phonetic, explanation);
                        if (isNew) added++; else updated++;
                    }
                    showToast(`自动导入：${added} 个新词，${updated} 个更新`, 'success');
                    window.history.replaceState({}, '', window.location.pathname + window.location.hash);
                    onRoute();
                }
            });
        })
        .catch(() => showToast('自动导入失败', 'error'));
}

async function init() {
    await Storage.init();
    checkAndMarkMissedSessions();
    window.addEventListener('hashchange', onRoute);
    autoImportFromUrl();
    onRoute();
}

document.addEventListener('DOMContentLoaded', init);
</script>
